<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Gear outer ring (8 teeth) -->
  <g transform="translate(256,256)">
    <!-- Gear teeth -->
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(0)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(45)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(90)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(135)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(180)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(225)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(270)"/>
    <rect x="-18" y="-280" width="36" height="80" rx="8" fill="white" transform="rotate(315)"/>

    <!-- Gear inner ring -->
    <circle cx="0" cy="0" r="200" fill="url(#bg)"/>
    <circle cx="0" cy="0" r="170" fill="white"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="140" fill="url(#bg)"/>

    <!-- Code brackets: < / > -->
    <text x="0" y="-85" text-anchor="middle" dominant-baseline="central"
          font-family="monospace" font-weight="700" font-size="60"
          fill="white" opacity="0.15">&lt;</text>

    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="monospace" font-weight="700" font-size="80"
          fill="white">OC</text>

    <text x="0" y="85" text-anchor="middle" dominant-baseline="central"
          font-family="monospace" font-weight="700" font-size="60"
          fill="white" opacity="0.15">/&gt;</text>
  </g>
</svg>
